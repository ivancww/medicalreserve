<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫療儲備</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="醫療儲備">
    <meta name="theme-color" content="#007bff">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="calculator-container" id="pdf-content">
        <header>
            <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;">
                醫療儲備方案
                <span id="app-version-display" style="font-size: 0.9rem; color: var(--primary-color); background: #e7f3ff; padding: 4px 10px; border-radius: 12px; font-weight: bold; border: 1px solid #cce5ff;">Version 2.0.2</span>
            </h1>
            <p>未來的自己無懼醫保的加幅，兼享有價值的保障</p>
        </header>

        <div class="management-section no-print">
            <h3>報告管理</h3>
            <div class="management-grid" style="display: flex; justify-content: center; gap: 1rem;">
                <div class="input-group">
                    <button id="generate-pdf-btn" class="btn btn-primary" style="font-size: 1.1rem; padding: 10px 20px;">📄 生成 PDF 報告</button>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="top-input-grid">
                <div class="input-group" style="max-width: 250px; margin: auto;">
                    <label for="start-age">開始歲數</label>
                    <input type="number" id="start-age" value="30">
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>退休后醫療保費</h2>
            <div class="top-input-grid">
                <div class="input-group">
                    <label for="medical-plan">醫療保障</label>
                    <select id="medical-plan">
                        <option value="flexi">自願醫保靈活計劃</option>
                        <option value="high-end">自願醫保高端醫療</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="deductible">墊底費</label>
                    <select id="deductible">
                        <option value="0">HK$0</option>
                        <option value="8000">HK$8,000</option>
                        <option value="16000">HK$16,000</option>
                        <option value="18000">HK$18,000</option>
                        <option value="25000">HK$25,000</option>
                        <option value="30000">HK$30,000</option>
                        <option value="50000">HK$50,000</option>
                    </select>
                </div>
                <div class="input-group no-print">
                    <label for="medical-premium-file-btn">保費表</label>
                    <button id="medical-premium-file-btn" class="btn btn-secondary">上載Excel保費表</button>
                    <input type="file" id="medical-premium-file" hidden accept=".xlsx, .xls">
                </div>
                <div class="input-group">
                    <label for="medical-inflation-rate">
                        預期醫療通脹率: <span id="medical-inflation-value">5.0%</span>
                    </label>
                    <input type="range" id="medical-inflation-rate" min="0" max="10" value="5" step="0.1">
                </div>
                <div class="input-group">
                    <label for="retirement-age">預計退休年齡</label>
                    <input type="number" id="retirement-age" value="65">
                </div>
                 <div class="input-group">
                    <label for="life-expectancy">預期壽命</label>
                    <input type="number" id="life-expectancy" value="99" max="100">
                </div>
            </div>
            <div class="duel-summary">
                <div class="summary-item">
                    <span class="summary-value" id="total-premium-no-inflation">-</span>
                    <span class="summary-label">未計通脹總保費</span>
                </div>
                <div class="summary-item">
                    <span class="summary-value" id="total-premium-with-inflation">-</span>
                    <span class="summary-label">已計通脹總保費</span>
                </div>
                <div class="summary-item">
                    <span class="summary-value difference" id="inflation-difference">-</span>
                    <span class="summary-label">通脹造成總差距</span>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>複利增值：對沖醫療保費儲備</h2>
            <div class="input-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                <div class="input-group">
                    <label for="plan1-contribution">儲備金庫一 (第1年供)</label>
                    <input type="text" id="plan1-contribution" value="40,000" inputmode="numeric">
                    <select id="plan1-strategy" style="margin-top: 0.5rem; width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                        <option value="none">滾存不提取</option>
                        <option value="withdraw8_from8">第8年取8%</option>
                        <option value="withdraw13_from15">第15年取13%</option>
                        <option value="withdraw18_from20">第20年取18%</option>
                        <option value="withdraw23_from25">第25年取23%</option>
                        <option value="withdraw29_from30">第30年取29%</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="plan2-contribution">儲備金庫二 (第6年供)</label>
                    <input type="text" id="plan2-contribution" value="50,000" inputmode="numeric">
                    <select id="plan2-strategy" style="margin-top: 0.5rem; width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                        <option value="none">滾存不提取</option>
                        <option value="withdraw8_from8">第8年取8%</option>
                        <option value="withdraw13_from15">第15年取13%</option>
                        <option value="withdraw18_from20">第20年取18%</option>
                        <option value="withdraw23_from25">第25年取23%</option>
                        <option value="withdraw29_from30">第30年取29%</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="plan3-contribution">儲備金庫三 (第11年供)</label>
                    <input type="text" id="plan3-contribution" value="60,000" inputmode="numeric">
                    <select id="plan3-strategy" style="margin-top: 0.5rem; width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                        <option value="none">滾存不提取</option>
                        <option value="withdraw8_from8">第8年取8%</option>
                        <option value="withdraw13_from15">第15年取13%</option>
                        <option value="withdraw18_from20">第20年取18%</option>
                        <option value="withdraw23_from25">第25年取23%</option>
                        <option value="withdraw29_from30">第30年取29%</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="plan4-contribution">儲備金庫四 (第16年供)</label>
                    <input type="text" id="plan4-contribution" value="70,000" inputmode="numeric">
                    <select id="plan4-strategy" style="margin-top: 0.5rem; width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                        <option value="none">滾存不提取</option>
                        <option value="withdraw8_from8">第8年取8%</option>
                        <option value="withdraw13_from15">第15年取13%</option>
                        <option value="withdraw18_from20">第20年取18%</option>
                        <option value="withdraw23_from25">第25年取23%</option>
                        <option value="withdraw29_from30">第30年取29%</option>
                    </select>
                </div>
            </div>
            <div class="table-wrapper" style="margin-top: 2rem;">
                <table id="results-table">
                    <thead id="results-table-head"></thead>
                    <tbody id="results-table-body"></tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <h2 style="text-align: center; margin-bottom: 1rem;">先支出，後享增值同時慳保費</h2>
            
            <div class="chart-container" style="position: relative; height: 400px; width: 100%; margin-bottom: 2rem; background: #fff; padding: 1rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <canvas id="medicalChart"></canvas>
            </div>
            
            <div class="summary-boxes" style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 1rem; margin-top: 1rem;">
                <div class="display-box" style="background: #f8f9fa; border-left: 5px solid var(--primary-color); padding: 1rem; border-radius: 8px; flex: 1; min-width: 200px; text-align: center;">
                    <div style="font-size: 0.9rem; color: #666;">總已繳本金</div>
                    <div id="display-total-contribution-value" style="font-size: 1.5rem; font-weight: bold; color: var(--text-color);">-</div>
                </div>
                <div class="display-box" style="background: #f8f9fa; border-left: 5px solid var(--gain-color); padding: 1rem; border-radius: 8px; flex: 1; min-width: 200px; text-align: center;">
                    <div style="font-size: 0.9rem; color: #666;">退休時戶口餘額</div>
                    <div id="display-policy-value-value" style="font-size: 1.5rem; font-weight: bold; color: var(--gain-color);">-</div>
                </div>
                <div class="display-box" style="background: #fff5f5; border-left: 5px solid #dc3545; padding: 1rem; border-radius: 8px; flex: 1; min-width: 200px; text-align: center;">
                    <div style="font-size: 0.9rem; color: #666;">通脹後總醫療保費</div>
                    <div id="display-inflated-medical-value" style="font-size: 1.5rem; font-weight: bold; color: #dc3545;">-</div>
                </div>
            </div>
        </div>
        
        <footer style="text-align: center; margin-top: 2rem; padding-bottom: 2rem;">
            <p style="font-size: 1.2rem; font-weight: bold; color: var(--primary-color); margin-bottom: 10px;">未雨綢繆，用今天的增值，為明天的健康買單。</p>
            <p style="font-size: 0.8rem; color: #888;">*所有市場數據均為基於公開資料的近似值，僅供參考。</p>
        </footer>
    </div>

    <script src="script.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('SW registered');
                }).catch(err => {
                    console.log('SW failed', err);
                });
            });
        }
    </script>
</body>
</html>
